<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JEE Formula Vault — Trigonometry (Full)</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root {
  --bg: #080c14;
  --bg2: #0e1420;
  --card: #111827;
  --card2: #161f30;
  --border: #1c2840;
  --fg: #e4e8f0;
  --muted: #5e6e87;
  --accent: #3b82f6; /* Royal Blue */
  --accent-glow: rgba(59, 130, 246, 0.05);
  --accent-glow-active: rgba(59, 130, 246, 0.1);
  --accent-mark: rgba(59, 130, 246, 0.25);
  --radius: 10px;
  --tip-bg: rgba(255, 193, 7, 0.06);
  --tip-border: rgba(255, 193, 7, 0.25);
  --tip-text: #ffc107;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Space Grotesk', sans-serif;
  background: var(--bg);
  color: var(--fg);
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse at 20% 0%, var(--accent-glow), transparent 60%),
              radial-gradient(ellipse at 80% 100%, rgba(0, 196, 255, 0.03), transparent 60%);
  pointer-events: none;
  z-index: 0;
}

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg2); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #2a3a5c; }

#sidebar {
  position: fixed;
  left: 0;
  top: 0;
  bottom: 0;
  width: 290px;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  z-index: 100;
  display: flex;
  flex-direction: column;
  transition: transform .3s ease;
}

.sidebar-head {
  padding: 1.25rem;
  border-bottom: 1px solid var(--border);
}

.sidebar-head h2 {
  font-size: 1.15rem;
  font-weight: 700;
  letter-spacing: -.02em;
  display: flex;
  align-items: center;
  gap: .5rem;
}

.sidebar-head h2 i { color: var(--accent); font-size: .9rem; }
.sidebar-head .sub { font-size: .72rem; color: var(--muted); margin-top: .25rem; letter-spacing: .03em; }

.search-box { padding: .75rem 1rem; position: relative; }
.search-box i { position: absolute; left: 1.65rem; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: .8rem; }
.search-box input {
  width: 100%;
  padding: .55rem .75rem .55rem 2.2rem;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--fg);
  font-family: inherit;
  font-size: .82rem;
  outline: none;
  transition: border-color .2s;
}
.search-box input:focus { border-color: var(--accent); }

.sidebar-actions {
  padding: 1rem;
  border-top: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: .5rem;
  margin-top: auto;
}

.action-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: .5rem;
  padding: .6rem;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--fg);
  font-family: inherit;
  font-size: .8rem;
  font-weight: 500;
  cursor: pointer;
  transition: all .2s;
  text-decoration: none;
}

.action-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-glow); }
.action-btn.active { background: var(--accent-glow-active); border-color: var(--accent); color: var(--accent); }

#menuBtn {
  display: none;
  position: fixed;
  top: 1rem;
  left: 1rem;
  z-index: 200;
  width: 40px;
  height: 40px;
  border-radius: 8px;
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--fg);
  font-size: 1rem;
  cursor: pointer;
  align-items: center;
  justify-content: center;
}

#overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 90; }

#main {
  margin-left: 290px;
  padding: 2rem 2.5rem 4rem;
  position: relative;
  z-index: 1;
  min-height: 100vh;
}

.hero { display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; }
.stat-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: .85rem 1.1rem;
  flex: 1;
  min-width: 130px;
  transition: border-color .2s, transform .2s;
}
.stat-card:hover { border-color: rgba(255, 255, 255, .15); transform: translateY(-2px); }
.stat-card .sc-label { font-size: .68rem; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
.stat-card .sc-val { font-size: 1.5rem; font-weight: 700; font-family: 'JetBrains Mono', monospace; margin-top: .15rem; }

.subject-header { margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border); }
.subject-header h1 { font-size: 1.8rem; font-weight: 800; letter-spacing: -.03em; display: flex; align-items: center; gap: .6rem; }
.subject-header h1 i { font-size: 1.2rem; }
.subject-header p { color: var(--muted); font-size: .9rem; margin-top: .4rem; line-height: 1.5; }

.section { margin-bottom: 1rem; }
.section-header {
  display: flex;
  align-items: center;
  gap: .6rem;
  padding: .85rem 1rem;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  cursor: pointer;
  transition: all .2s;
  user-select: none;
}
.section-header:hover { border-color: rgba(255, 255, 255, .15); background: var(--card2); }
.section-header.open { border-radius: var(--radius) var(--radius) 0 0; border-bottom-color: transparent; }
.section-header .sh-icon { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; border-radius: 6px; font-size: .7rem; flex-shrink: 0; }
.section-header .sh-title { font-size: .92rem; font-weight: 600; flex: 1; }
.section-header .sh-count { font-size: .7rem; color: var(--muted); font-family: 'JetBrains Mono', monospace; }
.section-header .sh-arrow { color: var(--muted); font-size: .7rem; transition: transform .25s; }
.section-header.open .sh-arrow { transform: rotate(180deg); }

.section-body {
  overflow: hidden;
  max-height: 0;
  transition: max-height .35s ease, border-color .2s;
  border: 1px solid transparent;
  border-top: none;
  border-radius: 0 0 var(--radius) var(--radius);
}
.section-body.open { max-height: 8000px; border-color: var(--border); background: var(--bg2); }

.formula-grid { padding: .75rem; display: grid; grid-template-columns: 1fr; gap: .6rem; }
.formula-card {
  display: flex;
  flex-direction: column;
  gap: .25rem;
  padding: .75rem .9rem;
  background: rgba(255, 255, 255, .015);
  border: 1px solid rgba(255, 255, 255, .04);
  border-radius: 8px;
  cursor: pointer;
  transition: all .2s;
  position: relative;
}
.formula-card:hover { background: rgba(255, 255, 255, .035); border-color: rgba(255, 255, 255, .08); }
.formula-card:active { transform: scale(.995); }

.fc-main-row { display: flex; align-items: flex-start; gap: .75rem; width: 100%; }
.formula-card .fc-name { font-size: .8rem; color: var(--muted); min-width: 150px; flex-shrink: 0; font-weight: 600; line-height: 1.4; }
.formula-card .fc-formula { font-family: 'JetBrains Mono', monospace; font-size: .82rem; font-weight: 500; color: var(--fg); line-height: 1.5; word-break: break-word; flex-grow: 1; }

.formula-card .fc-exp {
  font-size: 0.74rem;
  color: #94a3b8;
  margin-top: 0.25rem;
  line-height: 1.45;
  font-weight: 400;
  padding-left: 0.1rem;
}
.formula-card .fc-exp i { color: var(--accent); margin-right: 0.35rem; }

.formula-card .fc-copy { position: absolute; top: .5rem; right: .5rem; opacity: 0; font-size: .65rem; color: var(--muted); transition: opacity .15s; }
.formula-card .fc-star { position: absolute; top: .5rem; right: 1.8rem; opacity: 0; font-size: .75rem; color: #ffb81c; transition: opacity 0.15s, transform 0.1s; }
.formula-card:hover .fc-copy, .formula-card:hover .fc-star { opacity: 1; }
.formula-card .fc-star.active { opacity: 1 !important; }
.formula-card .fc-star:active { transform: scale(1.2); }

.jee-tip {
  margin: .5rem .75rem .75rem;
  padding: .65rem .85rem;
  background: var(--tip-bg);
  border: 1px solid var(--tip-border);
  border-radius: 8px;
  font-size: .78rem;
  color: var(--tip-text);
  line-height: 1.55;
  display: flex;
  gap: .5rem;
  align-items: flex-start;
}
.jee-tip i { margin-top: 2px; flex-shrink: 0; }

.master-sheet { margin-top: 2rem; display: none; }
.master-sheet.show-master { display: block !important; }
.master-sheet h2 { font-size: 1.15rem; font-weight: 700; margin-bottom: 1rem; display: flex; align-items: center; gap: .5rem; }
.master-sheet h2 i { color: var(--accent); }
.master-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: .5rem; }
.master-card { display: flex; gap: .6rem; padding: .65rem .8rem; background: var(--card); border: 1px solid var(--border); border-radius: 8px; cursor: pointer; transition: all .2s; }
.master-card:hover { border-color: rgba(59, 130, 246, .3); transform: translateY(-1px); }
.master-card .mc-concept { font-size: .72rem; color: var(--muted); min-width: 110px; flex-shrink: 0; font-weight: 500; }
.master-card .mc-formula { font-family: 'JetBrains Mono', monospace; font-size: .78rem; line-height: 1.5; }

mark { background: var(--accent-mark); color: var(--fg); border-radius: 2px; padding: 0 2px; }

#toast {
  position: fixed;
  bottom: 2rem;
  right: 2rem;
  padding: .65rem 1.1rem;
  background: var(--card2);
  border: 1px solid var(--accent);
  border-radius: 8px;
  font-size: .8rem;
  color: var(--accent);
  z-index: 500;
  opacity: 0;
  transform: translateY(10px);
  transition: all .25s;
  pointer-events: none;
  display: flex;
  align-items: center;
  gap: .5rem;
}
#toast.show { opacity: 1; transform: translateY(0); }

.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 300; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity .25s; }
.modal-overlay.show { opacity: 1; pointer-events: auto; }
.modal { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 2rem; max-width: 500px; width: 90%; text-align: center; transform: scale(.9); transition: transform .25s; }
.modal-overlay.show .modal { transform: scale(1); }
.modal .modal-subject { font-size: .72rem; text-transform: uppercase; letter-spacing: .06em; margin-bottom: .5rem; }
.modal .modal-name { font-size: 1.1rem; font-weight: 600; margin-bottom: 1.25rem; min-height: 1.5rem; }
.modal .modal-formula { font-family: 'JetBrains Mono', monospace; font-size: 1.3rem; font-weight: 600; padding: 1.25rem; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 1rem; min-height: 60px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all .2s; }
.modal .modal-formula:hover { border-color: var(--accent); }
.modal .modal-formula.hidden-f { filter: blur(8px); user-select: none; }
.modal .modal-btns { display: flex; gap: .75rem; justify-content: center; }
.modal .modal-btns button { padding: .55rem 1.25rem; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--fg); font-family: inherit; font-size: .82rem; font-weight: 500; cursor: pointer; transition: all .2s; }
.modal .modal-btns button:hover { border-color: var(--accent); color: var(--accent); }
.modal .modal-btns button.primary { background: var(--accent); color: #080c14; border-color: var(--accent); font-weight: 600; }
.modal .modal-btns button.primary:hover { opacity: .85; }

#backTop { position: fixed; bottom: 2rem; left: 310px; width: 38px; height: 38px; border-radius: 50%; background: var(--card); border: 1px solid var(--border); color: var(--muted); display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 50; opacity: 0; transition: all .25s; font-size: .85rem; }
#backTop.show { opacity: 1; }
#backTop:hover { color: var(--accent); border-color: var(--accent); }

@media(max-width:860px){
  #sidebar { transform: translateX(-100%); }
  #sidebar.open { transform: translateX(0); }
  #menuBtn { display: flex; }
  #main { margin-left: 0; padding: 1.25rem 1rem 3rem; padding-top: 3.5rem; }
  #backTop { left: 1rem; bottom: 1rem; }
  .hero { gap: .5rem; }
  .stat-card { min-width: 100px; padding: .6rem .8rem; }
  .stat-card .sc-val { font-size: 1.2rem; }
  .formula-card .fc-main-row { flex-direction: column; gap: .25rem; }
  .formula-card .fc-name { min-width: unset; }
  .master-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<button id="menuBtn" aria-label="Open menu"><i class="fa-solid fa-bars"></i></button>
<div id="overlay"></div>

<aside id="sidebar">
  <div class="sidebar-head">
    <h2><i class="fa-solid fa-vault"></i> Formula Vault</h2>
    <div class="sub">JEE Main & Advanced — Complete Reference</div>
  </div>
  <div class="search-box">
    <i class="fa-solid fa-magnifying-glass"></i>
    <input type="text" id="searchInput" placeholder="Search formulas, topics..." aria-label="Search formulas">
  </div>
  <div style="padding: 0 1rem 0.5rem 1rem;">
     <a href="../index.html" class="action-btn" style="width: 100%; border-color: rgba(255,255,255,0.1);"><i class="fa-solid fa-arrow-left"></i> Back to Portal</a>
  </div>
  <div class="sidebar-actions">
    <button class="action-btn" id="qrBtn"><i class="fa-solid fa-bolt"></i> Quick Revision</button>
    <button class="action-btn" id="randomBtn"><i class="fa-solid fa-shuffle"></i> Random Formula</button>
    <button class="action-btn" id="expandBtn"><i class="fa-solid fa-expand"></i> Expand All</button>
  </div>
</aside>

<main id="main"></main>

<div id="toast"><i class="fa-solid fa-check"></i> <span id="toastMsg">Copied!</span></div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-subject" id="modalSubject"></div>
    <div class="modal-name" id="modalName"></div>
    <div class="modal-formula hidden-f" id="modalFormula">—</div>
    <div class="modal-btns">
      <button id="modalReveal">Reveal</button>
      <button id="modalNext" class="primary">Next</button>
    </div>
  </div>
</div>
<button id="backTop" aria-label="Back to top"><i class="fa-solid fa-arrow-up"></i></button>

<script>
const FORMULA_DATA = {
  id: 'trigonometry',
  ti: 'Trigonometry (Full)',
  ic: 'fa-solid fa-wave-square',
  c: '#3b82f6',
  d: 'Ratios, compound angles, transformation formulas, trigonometric equations, ITF domain/range, and properties of triangles.',
  sections: [
    {
      s: 'Basic Pythagorean Identities & Quadrants',
      t: 'ASTC rule: All positive in Q1, Sin/Csc in Q2, Tan/Cot in Q3, Cos/Sec in Q4.',
      i: [
        { n: 'Fundamental Identity 1', f: 'sin² θ + cos² θ = 1', qr: true, e: 'Base Pythagorean identity. Holds for all real angles θ.' },
        { n: 'Fundamental Identity 2', f: 'sec² θ - tan² θ = 1  =>  sec θ - tan θ = 1 / (sec θ + tan θ)', qr: true, e: 'Crucial algebraic reciprocal relation used to convert linear sums into differences.' },
        { n: 'Fundamental Identity 3', f: 'csc² θ - cot² θ = 1  =>  csc θ - cot θ = 1 / (csc θ + cot θ)', e: 'Holds for all θ where sin θ != 0.' },
        { n: 'Complementary Angle Rules', f: 'sin(90° - θ) = cos θ  ;  tan(90° - θ) = cot θ  ;  sec(90° - θ) = csc θ', e: 'Trigonometric functions switch to co-functions across odd multiples of 90°.' },
        { n: 'Supplementary Angle Rules', f: 'sin(180° - θ) = sin θ  ;  cos(180° - θ) = -cos θ  ;  tan(180° - θ) = -tan θ', e: 'Functions retain their name across multiples of 180°, only sign changes per quadrant.' }
      ]
    },
    {
      s: 'Compound Angle Formulas',
      t: 'Compound expansions convert sums of angles into products of individual trigonometric functions.',
      i: [
        { n: 'sin(A +- B)', f: 'sin(A +- B) = sin A cos B +- cos A sin B', qr: true, e: 'Expands sine of sum or difference. Sign remains same as input operator.' },
        { n: 'cos(A +- B)', f: 'cos(A +- B) = cos A cos B -+ sin A sin B', qr: true, e: 'Expands cosine of sum or difference. Notice the sign flips (-+).' },
        { n: 'tan(A +- B)', f: 'tan(A +- B) = (tan A +- tan B) / (1 -+ tan A tan B)', qr: true, e: 'Useful for finding angles between two intersecting lines with slopes m₁ and m₂.' },
        { n: 'cot(A +- B)', f: 'cot(A +- B) = (cot A cot B -+ 1) / (cot B +- cot A)', e: 'Note the order of terms in the denominator (cot B +- cot A).' },
        { n: 'sin(A+B) · sin(A-B)', f: 'sin² A - sin² B = cos² B - cos² A', qr: true, e: 'High-yield identity converting product of compound sines into differences of squares.' },
        { n: 'cos(A+B) · cos(A-B)', f: 'cos² A - sin² B = cos² B - sin² A', e: 'Notice the mixed terms (cos² A - sin² B).' },
        { n: 'tan(A + B + C)', f: 'tan(A+B+C) = (S₁ - S₃) / (1 - S₂)  [where S₁=ΣtanA, S₂=ΣtanA tanB, S₃=tanA tanB tanC]', e: 'General expansion for three angles. Useful for conditional identity derivations.' }
      ]
    },
    {
      s: 'Transformation Formulas (Sum/Diff <=> Product)',
      t: 'Sum-to-product transforms addition into multiplication for factoring; product-to-sum simplifies calculus integrals.',
      i: [
        { n: '2 sin A cos B', f: 'sin(A + B) + sin(A - B)', qr: true, e: 'Converts product of mixed sine and cosine into sum of sines.' },
        { n: '2 cos A sin B', f: 'sin(A + B) - sin(A - B)', e: 'Difference of sines when cosine precedes sine.' },
        { n: '2 cos A cos B', f: 'cos(A + B) + cos(A - B)', qr: true, e: 'Converts product of cosines into sum of cosines.' },
        { n: '2 sin A sin B', f: 'cos(A - B) - cos(A + B)', qr: true, e: 'Notice cos(A - B) comes FIRST to keep the result positive.' },
        { n: 'sin C + sin D', f: '2 sin((C+D)/2) · cos((C-D)/2)', qr: true, e: 'Factorization tool for sine addition.' },
        { n: 'sin C - sin D', f: '2 cos((C+D)/2) · sin((C-D)/2)', e: 'Factorization tool for sine subtraction.' },
        { n: 'cos C + cos D', f: '2 cos((C+D)/2) · cos((C-D)/2)', qr: true, e: 'Factorization tool for cosine addition.' },
        { n: 'cos C - cos D', f: '-2 sin((C+D)/2) · sin((C-D)/2) = 2 sin((C+D)/2) · sin((D-C)/2)', e: 'Note the negative sign or switched argument (D - C).' }
      ]
    },
    {
      s: 'Multiple & Submultiple Angle Formulas',
      t: 'Double and triple angle expansions allow degree reduction in algebraic manipulations.',
      i: [
        { n: 'sin 2θ', f: '2 sin θ cos θ = (2 tan θ) / (1 + tan² θ)', qr: true, e: 'Parametric tangent form is heavily used in integral calculus substitutions.' },
        { n: 'cos 2θ', f: 'cos² θ - sin² θ = 2 cos² θ - 1 = 1 - 2 sin² θ = (1 - tan² θ) / (1 + tan² θ)', qr: true, e: 'Four equivalent forms. Essential for power reduction (cos² θ = (1+cos 2θ)/2).' },
        { n: 'tan 2θ', f: '(2 tan θ) / (1 - tan² θ)', qr: true, e: 'Denominator is (1 - tan² θ), whereas sin 2θ has (1 + tan² θ).' },
        { n: 'Half-angle 1 - cos θ', f: '1 - cos θ = 2 sin²(θ/2)', qr: true, e: 'Primary power-reduction identity for simplifying square roots in limits.' },
        { n: 'Half-angle 1 + cos θ', f: '1 + cos θ = 2 cos²(θ/2)', qr: true, e: 'Primary power-reduction identity for cosine.' },
        { n: 'sin 3θ', f: '3 sin θ - 4 sin³ θ', qr: true, e: 'Triple angle expansion for sine.' },
        { n: 'cos 3θ', f: '4 cos³ θ - 3 cos θ', qr: true, e: 'Triple angle expansion for cosine.' },
        { n: 'tan 3θ', f: '(3 tan θ - tan³ θ) / (1 - 3 tan² θ)', e: 'Derived by evaluating tan(2θ + θ).' }
      ]
    },
    {
      s: 'Conditional Identities (For A + B + C = π)',
      t: 'These relations hold specifically when A, B, C are interior angles of a triangle.',
      i: [
        { n: 'Tangent Sum-Product Equality', f: 'tan A + tan B + tan C = tan A · tan B · tan C', qr: true, e: 'Holds when A+B+C = π (or nπ). Converts sum of tangents into their product.' },
        { n: 'Pairwise Cotangent Sum', f: 'cot A cot B + cot B cot C + cot C cot A = 1', qr: true, e: 'Derived by taking cot(A + B) = cot(π - C).' },
        { n: 'Half-Angle Tangent Pairwise', f: 'tan(A/2)tan(B/2) + tan(B/2)tan(C/2) + tan(C/2)tan(A/2) = 1', e: 'Holds for any triangle ABC since A/2 + B/2 + C/2 = π/2.' },
        { n: 'Half-Angle Cotangent Sum', f: 'cot(A/2) + cot(B/2) + cot(C/2) = cot(A/2) · cot(B/2) · cot(C/2)', e: 'Analogous to the full angle tangent product equality.' },
        { n: 'Double Angle Sine Sum', f: 'sin 2A + sin 2B + sin 2C = 4 sin A sin B sin C', qr: true, e: 'High-frequency identity in JEE Advanced proofs.' },
        { n: 'Double Angle Cosine Sum', f: 'cos 2A + cos 2B + cos 2C = -1 - 4 cos A cos B cos C', e: 'Notice the constant term -1 on the RHS.' },
        { n: 'Single Angle Sine Sum', f: 'sin A + sin B + sin C = 4 cos(A/2) cos(B/2) cos(C/2)', qr: true, e: 'Converts sum of sines of triangle angles into product of half-angle cosines.' },

let searchQuery = '', quickRevision = false, expandedSections = new Set(), allExpanded = false;

function esc(s) { return String(s).replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

function formatMathText(text) {
  const tokens = []; let index = 0;
  const protectedText = text.replace(/<(\/?)(mark|sub|sup)>/g, (m, slash, tag) => {
    const token = `__TAG${index++}__`;
    tokens.push(`<${slash}${tag}>`);
    return token;
  });
  const escaped = protectedText.replace(/</g, '&lt;').replace(/>/g, '&gt;');
  const rendered = escaped
    .replace(/([A-Za-zα-ωΑ-Ω0-9\)\]])_\{([^}]+)\}/g, '$1<sub>$2</sub>')
    .replace(/([A-Za-zα-ωΑ-Ω0-9\)\]])_([A-Za-z0-9]+)/g, '$1<sub>$2</sub>')
    .replace(/\^\(([^)]+)\)/g, '<sup>( $1 )</sup>')
    .replace(/\^\{([^}]+)\}/g, '<sup>$1</sup>')
    .replace(/\^([A-Za-z0-9]+)/g, '<sup>$1</sup>');
  return rendered.replace(/__TAG(\d+)__/g, (_, i) => tokens[Number(i)]);
}

function highlight(text, q) {
  const safeText = esc(text);
  if (!q) return formatMathText(safeText);
  const e = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return formatMathText(safeText.replace(new RegExp(`(${e})`, 'gi'), '<mark>$1</mark>'));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  t.classList.add('show'); clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 1800);
}

function copyText(text) {
  navigator.clipboard.writeText(text).then(() => showToast('Formula copied!')).catch(() => {});
}

function toggleStar(event, name, formula) {
  event.stopPropagation();
  let starred = JSON.parse(localStorage.getItem('starredFormulas')) || [];
  const idx = starred.findIndex(item => item.formula === formula);
  
  if (idx > -1) {
    starred.splice(idx, 1);
    showToast('Removed from Cheat Sheet');
    event.currentTarget.classList.remove('active');
    event.currentTarget.innerHTML = '<i class="fa-regular fa-star"></i>';
  } else {
    starred.push({ subject: FORMULA_DATA.ti, name: name, formula: formula });
    showToast('Saved to Starred Cheat Sheet!');
    event.currentTarget.classList.add('active');
    event.currentTarget.innerHTML = '<i class="fa-solid fa-star"></i>';
  }
  localStorage.setItem('starredFormulas', JSON.stringify(starred));
}

function isStarred(formula) {
  const starred = JSON.parse(localStorage.getItem('starredFormulas')) || [];
  return starred.some(item => item.formula === formula);
}

function renderContent() {
  const main = document.getElementById('main');
  const q = searchQuery.toLowerCase().trim();
  
  let sectionHtml = '';
  let totalF = 0;
  let activeSections = 0;

  FORMULA_DATA.sections.forEach((sec, si) => {
    const itemsFiltered = sec.i.filter(item => {
      if (item.qrOnly) return false;
      return !q || item.n.toLowerCase().includes(q) || item.f.toLowerCase().includes(q) || (item.e && item.e.toLowerCase().includes(q));
    });

    if (itemsFiltered.length > 0) {
      activeSections++;
      totalF += itemsFiltered.length;
      const key = `${FORMULA_DATA.id}-${si}`;
      const isOpen = expandedSections.has(key) || q;

      sectionHtml += `
        <div class="section">
          <div class="section-header ${isOpen ? 'open' : ''}" data-key="${key}" style="border-left: 3px solid ${FORMULA_DATA.c}">
            <div class="sh-icon" style="background:${FORMULA_DATA.c}15; color:${FORMULA_DATA.c}">
              <i class="fa-solid fa-chevron-right" style="font-size:.55rem"></i>
            </div>
            <span class="sh-title">${highlight(sec.s, searchQuery)}</span>
            <span class="sh-count">${itemsFiltered.length}</span>
            <i class="fa-solid fa-chevron-down sh-arrow"></i>
          </div>
          <div class="section-body ${isOpen ? 'open' : ''}">
            <div class="formula-grid">`;
      
      itemsFiltered.forEach(item => {
        const starClass = isStarred(item.f) ? 'active' : '';
        const starIcon = isStarred(item.f) ? 'fa-solid fa-star' : 'fa-regular fa-star';
        const expBlock = item.e ? `<div class="fc-exp"><i class="fa-solid fa-circle-info"></i> ${highlight(item.e, searchQuery)}</div>` : '';

        sectionHtml += `
          <div class="formula-card" data-formula="${esc(item.f)}" onclick="copyText(this.dataset.formula)">
            <span class="fc-copy"><i class="fa-regular fa-copy"></i></span>
            <span class="fc-star ${starClass}" onclick="toggleStar(event, '${esc(item.n)}', '${esc(item.f)}')">
              <i class="${starIcon}"></i>
            </span>
            <div class="fc-main-row">
              <span class="fc-name">${highlight(item.n, searchQuery)}</span>
              <span class="fc-formula">${highlight(item.f, searchQuery)}</span>
            </div>
            ${expBlock}
          </div>`;
      });

      sectionHtml += `</div>`;
      if (sec.t && !q) {
        sectionHtml += `<div class="jee-tip"><i class="fa-solid fa-lightbulb"></i><span>${sec.t}</span></div>`;
      }
      sectionHtml += `</div></div>`;
    }
  });

  const revisionItems = [];
  FORMULA_DATA.sections.forEach(sec => {
    sec.i.forEach(item => {
      if (item.qr || item.qrOnly) {
        revisionItems.push(item);
      }
    });
  });

  let revisionHtml = `
    <div class="master-sheet ${quickRevision && !q ? 'show-master' : ''}">
      <h2><i class="fa-solid fa-bolt"></i> Master Formula Sheet — ${FORMULA_DATA.ti}</h2>
      <div class="master-grid">`;
  
  revisionItems.forEach(m => {
    revisionHtml += `
      <div class="master-card" data-formula="${esc(m.f)}" onclick="copyText(this.dataset.formula)">
        <span class="mc-concept">${highlight(m.n, searchQuery)}</span>
        <span class="mc-formula">${highlight(m.f, searchQuery)}</span>
      </div>`;
  });
  revisionHtml += `</div></div>`;

  let combinedLayout = `
    <div class="hero">
      <div class="stat-card">
        <div class="sc-label">Section Count</div>
        <div class="sc-val" style="color:var(--accent)">${FORMULA_DATA.sections.length}</div>
      </div>
      <div class="stat-card">
        <div class="sc-label">Active Formulas</div>
        <div class="sc-val" style="color:var(--accent)">${totalF}</div>
      </div>
    </div>
    <div class="subject-header" style="border-bottom-color:${FORMULA_DATA.c}30">
      <h1><i class="${FORMULA_DATA.ic}" style="color:${FORMULA_DATA.c}"></i> ${FORMULA_DATA.ti}</h1>
      <p>${FORMULA_DATA.d}</p>
    </div>
  `;

  if (quickRevision && !q) {
    combinedLayout += revisionHtml;
  } else {
    combinedLayout += sectionHtml + revisionHtml;
  }

  main.innerHTML = combinedLayout;
}

const urlParams = new URLSearchParams(window.location.search);
if (urlParams.get('mode') === 'quick') {
  quickRevision = true;
  document.getElementById('qrBtn').classList.add('active');
}

document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value;
  renderContent();
});

document.getElementById('main').addEventListener('click', e => {
  const header = e.target.closest('.section-header');
  if (!header) return;
  const key = header.dataset.key;
  if (expandedSections.has(key)) expandedSections.delete(key); else expandedSections.add(key);
  header.classList.toggle('open');
  header.nextElementSibling.classList.toggle('open');
});

document.getElementById('qrBtn').addEventListener('click', () => {
  quickRevision = !quickRevision;
  document.getElementById('qrBtn').classList.toggle('active', quickRevision);
  renderContent();
  showToast(quickRevision ? 'Quick Revision mode on' : 'Full view restored');
});

document.getElementById('expandBtn').addEventListener('click', () => {
  allExpanded = !allExpanded;
  if (allExpanded) {
    FORMULA_DATA.sections.forEach((sec, si) => expandedSections.add(`${FORMULA_DATA.id}-${si}`));
    document.getElementById('expandBtn').innerHTML = '<i class="fa-solid fa-compress"></i> Collapse All';
  } else {
    expandedSections.clear();
    document.getElementById('expandBtn').innerHTML = '<i class="fa-solid fa-expand"></i> Expand All';
  }
  renderContent();
});

document.getElementById('menuBtn').addEventListener('click', () => {
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('overlay').style.display = 'block';
});
document.getElementById('overlay').addEventListener('click', () => {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').style.display = 'none';
});

const backTop = document.getElementById('backTop');
window.addEventListener('scroll', () => { backTop.classList.toggle('show', window.scrollY > 400); });
backTop.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

const modal = document.getElementById('modal');
const modalSubject = document.getElementById('modalSubject');
const modalName = document.getElementById('modalName');
const modalFormula = document.getElementById('modalFormula');
let modalRevealed = false;

function showRandomFormula() {
  const allSubFormulas = [];
  FORMULA_DATA.sections.forEach(sec => sec.i.forEach(item => allSubFormulas.push(item)));
  
  const f = allSubFormulas[Math.floor(Math.random() * allSubFormulas.length)];
  modalSubject.textContent = FORMULA_DATA.ti;
  modalSubject.style.color = FORMULA_DATA.c;
  modalName.textContent = f.n;
  modalFormula.textContent = f.f;
  modalFormula.classList.add('hidden-f');
  modalRevealed = false;
  document.getElementById('modalReveal').textContent = 'Reveal';
  modal.classList.add('show');
}

document.getElementById('randomBtn').addEventListener('click', showRandomFormula);
document.getElementById('modalReveal').addEventListener('click', () => {
  if (!modalRevealed) {
    modalFormula.classList.remove('hidden-f');
    modalRevealed = true;
    document.getElementById('modalReveal').textContent = 'Copy';
  } else {
    copyText(modalFormula.textContent);
  }
});
document.getElementById('modalNext').addEventListener('click', showRandomFormula);
modal.addEventListener('click', e => { if (e.target === modal) modal.classList.remove('show'); });

expandedSections.add(`${FORMULA_DATA.id}-0`);
renderContent();
</script>
